# GitHub Pages 自动部署（公开仓，仓库根即前端 web/）
# 访问地址: https://sherman9527.github.io/JiaoshulangWeb/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with obfuscation
        run: npm run build
        env:
          # 后端地址 + 客户端标识为非敏感值，可直接写在此处；
          # API Key 通过仓库 Secret 注入（Settings → Secrets and variables → Actions）。
          VITE_API_BASE_URL: https://jiaoshulang-api.azurewebsites.net
          VITE_CLIENT_ID: web-frontend
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
